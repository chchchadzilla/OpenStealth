<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenStealth</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header .logo { font-size: 24px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .status {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.active { background: var(--green); }
    .status-dot.inactive { background: var(--border); }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }
    .btn.primary:hover {
      background: #79c0ff;
    }
    .footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 12px;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚡</span>
    <h1>OpenStealth</h1>
  </div>

  <div class="status">
    <div class="status-row">
      <span><span id="api-dot" class="status-dot inactive"></span> API</span>
      <span id="api-status" style="color: var(--text-dim)">Not configured</span>
    </div>
    <div class="status-row">
      <span><span id="monitor-dot" class="status-dot active"></span> Monitor</span>
      <span id="monitor-status" style="color: var(--green)">Active</span>
    </div>
    <div class="status-row">
      <span><span id="stealth-dot" class="status-dot active"></span> Stealth</span>
      <span id="stealth-status" style="color: var(--green)">High</span>
    </div>
  </div>

  <button id="btn-sidebar" class="btn primary">Open Sidebar Panel</button>
  <button id="btn-settings" class="btn">⚙️ Settings</button>

  <div class="footer">
    Your screen, your rules.
  </div>

  <script src="popup.js"></script>
</body>
</html>
